<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DedsiNative API Host</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 700px;
            width: 90%;
            padding: 2rem;
        }
        h1 {
            color: #000;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        p {
            font-size: 1.25rem;
            color: #555;
            margin-bottom: 3rem;
            line-height: 1.6;
            font-weight: 300;
        }
        .btn {
            display: inline-block;
            background-color: #000;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            border-radius: 0;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            border: 2px solid #000;
        }
        .btn:hover {
            background-color: transparent;
            color: #000;
        }
        .footer {
            margin-top: 5rem;
            font-size: 0.8rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DedsiNative API Host</h1>
        <p>极简、高效、现代化的 .NET Web API 服务。</p>
        
        <a href="/scalar/v1" class="btn">浏览 API 文档</a>
        
        <div class="footer">
            <p>Powered by .NET & DedsiNative</p>
        </div>
    </div>
</body>
</html>
